<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shopper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Shopper — sustainability assessment app */

:root {
  --bg: #FBF9F6;
  --bg-elev: #F4F0EA;
  --paper: #FFFFFF;
  --ink: #1A1815;
  --ink-2: #4A453E;
  --muted: #8A8278;
  --hairline: rgba(26, 24, 21, 0.10);
  --hairline-strong: rgba(26, 24, 21, 0.18);
  --pill: #EFEAE3;
  --pill-active: #1A1815;
  --pill-active-ink: #FBF9F6;
  --clay: oklch(0.74 0.04 35);
  --sage: oklch(0.74 0.04 145);
  --score-good: oklch(0.62 0.08 150);
  --score-mid:  oklch(0.70 0.09 75);
  --score-bad:  oklch(0.60 0.10 30);

  --serif: 'Cormorant Garamond', 'Cormorant', Georgia, serif;
  --sans: 'Inter', -apple-system, system-ui, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: #E8E4DD;
  font-family: var(--sans);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
input { font: inherit; color: inherit; }

/* Stage */
.stage {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  gap: 80px;
}

/* App container — replaces ios frame default content area */
.app {
  position: absolute;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  font-family: var(--sans);
  color: var(--ink);
}

/* ───── top tab nav (ABOUT / PARTNERS / ACCOUNT) ───── */
.topnav {
  padding: 60px 18px 14px;
  display: flex;
  gap: 8px;
  background: var(--bg);
  position: relative;
  z-index: 5;
}
.topnav-pill {
  flex: 1;
  height: 32px;
  border-radius: 999px;
  border: 0.75px solid var(--hairline-strong);
  background: var(--bg);
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.18s ease;
}
.topnav-pill.active {
  background: var(--pill-active);
  color: var(--pill-active-ink);
  border-color: var(--pill-active);
}
.topnav-pill:hover:not(.active) { background: var(--bg-elev); }

/* ───── scrollable body ───── */
.scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: 60px;
  scrollbar-width: none;
}
.scroll::-webkit-scrollbar { display: none; }

/* ───── landing ───── */
.land-search {
  padding: 14px 22px 0;
}
.land-search-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 6px;
}
.land-label {
  font-size: 13px;
  color: var(--ink-2);
  font-weight: 400;
}
.land-clear {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.land-input-wrap {
  position: relative;
  margin-top: 4px;
}
.land-input {
  width: 100%;
  height: 38px;
  padding: 0 16px 0 38px;
  border-radius: 999px;
  background: var(--pill);
  border: 0;
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--ink);
  outline: none;
}
.land-input::placeholder { color: var(--ink-2); opacity: 0.7; }
.land-input:focus { background: #E8E2D9; }
.land-search-icon {
  position: absolute;
  left: 14px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px;
  opacity: 0.55;
}

.divider-or {
  text-align: center;
  font-size: 9px;
  letter-spacing: 0.3em;
  color: var(--muted);
  margin: 22px 0 10px;
  position: relative;
}
.divider-or::before, .divider-or::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 36%;
  height: 0.5px;
  background: var(--hairline);
}
.divider-or::before { left: 8%; }
.divider-or::after { right: 8%; }

/* upload card */
.upload {
  margin: 0 22px;
  border: 1px dashed var(--hairline-strong);
  border-radius: 14px;
  padding: 22px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(255,255,255,0.4);
  transition: all 0.2s ease;
}
.upload:hover {
  background: rgba(255,255,255,0.7);
  border-color: var(--ink-2);
}
.upload-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--bg-elev);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: var(--ink-2);
}
.upload-text {
  flex: 1;
  font-size: 12.5px;
  color: var(--ink-2);
  line-height: 1.4;
}
.upload-text b {
  display: block;
  color: var(--ink);
  font-weight: 600;
  margin-bottom: 2px;
  font-size: 13px;
}
.upload-cta {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}

/* section header */
.sec-head {
  padding: 28px 22px 12px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}
.sec-title {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.sec-meta {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}

/* trending grid */
.grid {
  padding: 0 22px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px 14px;
}
.card {
  cursor: pointer;
  transition: transform 0.2s ease;
}
.card:active { transform: scale(0.97); }
.card-img {
  aspect-ratio: 1 / 1.05;
  border-radius: 14px;
  background: var(--bg-elev);
  position: relative;
  overflow: hidden;
  margin-bottom: 8px;
}
.card-img > .ph-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.card-score {
  position: absolute;
  top: 8px; right: 8px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(6px);
  font-family: var(--sans);
  font-feature-settings: "tnum" 1, "ss01" 0;
  font-size: 11px;
  padding: 3px 8px 4px;
  border-radius: 999px;
  letter-spacing: 0.02em;
  color: var(--ink);
}
.card-score b { font-weight: 600; }
.card-score em { font-style: normal; color: var(--muted); }
.card-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.005em;
}
.card-sub {
  font-size: 10.5px;
  color: var(--muted);
  margin-top: 2px;
  letter-spacing: 0.04em;
}

/* features section */
.features {
  margin-top: 30px;
  padding: 22px 22px 4px;
  background: var(--bg-elev);
  border-top: 0.5px solid var(--hairline);
}
.features-title {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}
.feat-row {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  padding: 12px 0;
  border-bottom: 0.5px solid var(--hairline);
  cursor: pointer;
}
.feat-row:last-child { border-bottom: 0; }
.feat-tag {
  flex-shrink: 0;
  width: 88px;
  min-height: 56px;
  border-radius: 12px;
  background: var(--bg);
  border: 0.5px solid var(--hairline);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-family: var(--serif);
  font-size: 13px;
  font-style: italic;
  padding: 8px;
  color: var(--ink);
}
.feat-body {
  flex: 1;
  padding-top: 2px;
}
.feat-body h4 {
  margin: 0 0 4px;
  font-size: 14px;
  font-weight: 500;
  font-family: var(--serif);
  line-height: 1.2;
}
.feat-body p {
  margin: 0;
  font-size: 11px;
  color: var(--ink-2);
  line-height: 1.45;
}
.feat-thumb {
  width: 70px;
  height: 56px;
  border-radius: 8px;
  background: var(--bg);
  border: 0.5px solid var(--hairline);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-2);
}

/* ───── product page ───── */
.prod-head {
  padding: 18px 22px 0;
}
.prod-head-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.prod-name {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: var(--ink);
}
.prod-stars {
  display: flex;
  gap: 3px;
  font-size: 14px;
  letter-spacing: 0.06em;
  line-height: 1;
}
.prod-stars .star {
  position: relative;
  display: inline-block;
  width: 1em; height: 1em;
}
.prod-stars .star-bg,
.prod-stars .star-fg {
  position: absolute; inset: 0;
  display: inline-block;
}
.prod-stars .star-bg { color: var(--hairline-strong); }
.prod-stars .star-fg {
  color: var(--ink);
  overflow: hidden;
  white-space: nowrap;
}

.prod-body {
  padding: 14px 22px 0;
  display: grid;
  grid-template-columns: 152px 1fr;
  gap: 16px;
}
.prod-img {
  aspect-ratio: 1 / 1.1;
  border-radius: 14px;
  background: var(--bg-elev);
  position: relative;
  overflow: hidden;
}
.prod-img > .ph-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

.prod-side {
  padding-top: 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
.scoring-label {
  font-family: var(--serif);
  font-size: 14px;
  letter-spacing: 0.36em;
  color: var(--ink);
  margin-bottom: 2px;
  margin-top: 8px;
}
.scoring-value {
  font-family: var(--serif);
  font-size: 30px;
  font-weight: 500;
  line-height: 1.1;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.scoring-value em {
  font-style: normal;
  color: var(--muted);
  font-size: 18px;
}
.scoring-blurb {
  margin-top: 10px;
  font-size: 10.5px;
  color: var(--ink-2);
  line-height: 1.45;
  text-align: center;
  font-style: italic;
  font-family: var(--serif);
}
.scoring-about {
  margin-top: 12px;
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
}
.scoring-current {
  margin-top: 5px;
  padding: 5px 14px;
  border-radius: 999px;
  background: var(--pill-active);
  color: var(--pill-active-ink);
  font-size: 9.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}

.brand-name {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--ink-2);
  letter-spacing: 0.18em;
  padding: 14px 22px 0;
}

/* areas / meters */
.areas {
  padding: 18px 22px 6px;
}
.areas-head {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.area-row {
  display: grid;
  grid-template-columns: 130px 1fr 36px;
  gap: 10px;
  align-items: center;
  padding: 7px 0;
}
.area-name {
  font-size: 12px;
  color: var(--ink);
}
.meter {
  height: 3px;
  border-radius: 999px;
  background: rgba(60,52,46,0.06);
  border: none;
  overflow: hidden;
  position: relative;
}
.meter-fill {
  height: 100%;
  border-radius: 999px;
  transition: width 0.9s cubic-bezier(0.2, 0.8, 0.2, 1);
  background: rgba(60,52,46,0.55);
}
.meter-val {
  font-family: var(--sans);
  font-feature-settings: "tnum" 1;
  font-size: 10.5px;
  color: var(--ink-2);
  text-align: right;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.01em;
}

/* tabs (sticky-ish under areas) */
.tabs {
  display: flex;
  gap: 8px;
  padding: 14px 18px 8px;
  background: var(--bg);
}
.tab {
  flex: 1;
  height: 30px;
  border-radius: 999px;
  border: 0.75px solid var(--hairline-strong);
  font-size: 10px;
  letter-spacing: 0.18em;
  font-weight: 500;
  color: var(--ink);
  text-transform: uppercase;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  transition: all 0.16s ease;
}
.tab:hover:not(.active) { background: var(--bg-elev); }
.tab.active {
  background: var(--pill-active);
  color: var(--pill-active-ink);
  border-color: var(--pill-active);
}

/* details about item (materials tab) */
.details {
  padding: 14px 22px 6px;
}
.details-head {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.detail-card {
  background: var(--bg-elev);
  border-radius: 14px;
  padding: 12px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  cursor: pointer;
  transition: background 0.16s ease;
}
.detail-card:hover { background: #ECE6DD; }
.detail-tag {
  flex-shrink: 0;
  width: 56px;
  min-height: 50px;
  border-radius: 10px;
  background: var(--paper);
  border: 0.5px solid var(--hairline);
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  font-size: 10.5px;
  font-weight: 500;
  padding: 4px;
  color: var(--ink);
}
.detail-body {
  flex: 1;
  font-size: 10.5px;
  color: var(--ink-2);
  line-height: 1.4;
}

/* as worn by (materials tab bottom) */
.worn {
  padding: 18px 22px 8px;
}
.worn-head {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.worn-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.worn-card {
  background: var(--bg-elev);
  border-radius: 12px;
  aspect-ratio: 1 / 1.05;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 9px;
  letter-spacing: 0.18em;
  font-weight: 500;
  padding: 6px;
  color: var(--ink);
  text-transform: uppercase;
  cursor: pointer;
}
.worn-card:hover { background: #ECE6DD; }

/* alternatives row */
.alts {
  padding: 18px 22px 8px;
}
.alts-head {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: baseline;
}
.alts-head .alts-sort { font-size: 9px; letter-spacing: 0.16em; }
.alts-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  margin: 0 -22px;
  padding: 0 22px 6px;
}
.alts-row::-webkit-scrollbar { display: none; }
.alt {
  flex-shrink: 0;
  width: 64px;
  cursor: pointer;
}
.alt-img {
  width: 64px; height: 64px;
  border-radius: 12px;
  background: var(--bg-elev);
  border: 0.5px solid var(--hairline);
  overflow: hidden;
  position: relative;
}
.alt-img > .ph-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.alt-img .alt-score {
  position: absolute;
  bottom: 4px; left: 4px;
  background: rgba(255,255,255,0.92);
  font-size: 8.5px;
  padding: 1px 5px;
  border-radius: 999px;
  font-family: var(--serif);
  font-weight: 500;
}
.alt-price {
  text-align: center;
  font-size: 10px;
  margin-top: 5px;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}

/* styling tab — price-over-time */
.price-track-wrap {
  padding: 16px 22px 0;
}
.price-track-tip {
  text-align: center;
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 14px;
  color: var(--ink);
}
.price-track-tip em { color: var(--ink); font-style: normal; font-weight: 600; }
.price-track {
  position: relative;
  height: 64px;
  margin: 8px 8px 0;
}
.price-track-axis {
  position: absolute;
  top: 22px; left: 0; right: 0;
  height: 1px;
  background: var(--hairline-strong);
}
.price-track-stop {
  position: absolute;
  top: 18px;
  width: 8px; height: 8px;
  border-radius: 999px;
  background: var(--bg);
  border: 1.5px solid var(--ink-2);
  transform: translateX(-50%);
}
.price-track-stop.now {
  background: var(--clay);
  border-color: var(--clay);
  width: 30px; height: 30px;
  top: 7px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif);
  font-size: 10px;
  color: var(--ink);
  letter-spacing: 0.06em;
}
.price-track-label {
  position: absolute;
  top: -4px;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink);
  transform: translateX(-50%);
}
.price-track-price {
  position: absolute;
  top: 36px;
  white-space: nowrap;
  font-size: 11px;
  font-family: var(--serif);
  color: var(--ink-2);
  transform: translateX(-50%);
  font-variant-numeric: tabular-nums;
}

.howto {
  padding: 22px 22px 6px;
}
.howto-head {
  display: flex; align-items: baseline; gap: 14px;
  margin-bottom: 10px;
}
.howto-eyebrow {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
}
.howto-tag {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.howto-body {
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 14px;
  align-items: flex-start;
}
.howto-img {
  width: 90px; height: 110px;
  border-radius: 10px;
  background: var(--bg-elev);
  position: relative;
  overflow: hidden;
}
.howto-img > .ph-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.howto-text {
  font-size: 11.5px;
  color: var(--ink);
  line-height: 1.5;
}
.howto-text p { margin: 0 0 8px; }
.howto-text p:last-child { margin: 0; color: var(--ink-2); }

.suitable {
  padding: 18px 22px 14px;
}
.suitable-head {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.suitable-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.suit-card {
  background: var(--bg-elev);
  border-radius: 12px;
  aspect-ratio: 1 / 0.95;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 9px;
  letter-spacing: 0.18em;
  font-weight: 500;
  padding: 6px;
  text-transform: uppercase;
  color: var(--ink);
  cursor: pointer;
  line-height: 1.25;
}
.suit-card:hover { background: #ECE6DD; }

/* placeholder image — minimal icon container */
.ph {
  position: absolute; inset: 0;
  background: var(--bg-elev);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-2);
  opacity: 0.95;
}
.icon-wrap {
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-2);
  opacity: 0.6;
}
.icon-wrap svg { width: 100%; height: 100%; display: block; }
.ph-label {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.06em;
  color: var(--ink-2);
  background: rgba(251,249,246,0.86);
  padding: 2px 6px;
  margin: 6px;
  border-radius: 4px;
  text-transform: uppercase;
}

/* tab transition */
.tab-content {

/* ===== ios-frame.jsx ===== */

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

// Shared bits — Stars, Score, placeholders, Topnav

function Stars({ value = 0, max = 5, scale = 10 }) {
  // value is on a 0..scale system (default 0..10). Render `max` stars.
  const filledFloat = (value / scale) * max; // 0..max
  return (
    <div className="prod-stars">
      {Array.from({ length: max }).map((_, i) => {
        const fill = Math.max(0, Math.min(1, filledFloat - i)); // 0..1
        return (
          <span key={i} className="star">
            <span className="star-bg">★</span>
            <span className="star-fg" style={{ width: `${fill * 100}%` }}>★</span>
          </span>
        );
      })}
    </div>
  );
}

function toneToColor(tone) {
  // Editorial: all meters use the same warm ink gradient as in the wireframe.
  // Tone is preserved as a subtle accent only (not a full color swap).
  return 'var(--ink)';
}

function Meter({ value, tone, animate }) {
  const [w, setW] = React.useState(0);
  React.useEffect(() => {
    if (!animate) { setW(value); return; }
    const id = requestAnimationFrame(() => setW(value));
    return () => cancelAnimationFrame(id);
  }, [value, animate]);
  const width = (animate ? w : value) * 100;
  return (
    <div className="meter">
      <div className="meter-fill" style={{ width: `${width}%` }} />
    </div>
  );
}

// Apply tweaks to the document (CSS vars + body classes)
function applyTweaks(s) {
  const r = document.documentElement;
  if (s.tone === 'warm') {
    r.style.setProperty('--bg', '#FBF9F6');
    r.style.setProperty('--bg-elev', '#F4F0EA');
    r.style.setProperty('--pill', '#EFEAE3');
    document.body.style.background = '#E8E4DD';
  } else if (s.tone === 'cool') {
    r.style.setProperty('--bg', '#F7F8FA');
    r.style.setProperty('--bg-elev', '#ECEEF1');
    r.style.setProperty('--pill', '#E5E8EC');
    document.body.style.background = '#DDE1E6';
  } else {
    r.style.setProperty('--bg', '#FFFFFF');
    r.style.setProperty('--bg-elev', '#F2F2F2');
    r.style.setProperty('--pill', '#EBEBEB');
    document.body.style.background = '#E0E0E0';
  }

  // Pill style — change pill background + active treatment
  const sheet = document.getElementById('tweak-style') || (() => {
    const el = document.createElement('style');
    el.id = 'tweak-style';
    document.head.appendChild(el);
    return el;
  })();
  let pillRules = '';
  if (s.pill === 'filled') {
    pillRules = `.topnav-pill, .tab { background: var(--bg-elev) !important; border-color: transparent !important; }`;
  } else if (s.pill === 'ghost') {
    pillRules = `.topnav-pill, .tab { background: transparent !important; border-color: transparent !important; }
                 .topnav-pill:not(.active), .tab:not(.active) { color: var(--muted); }`;
  }
  let densityRules = '';
  if (s.compact) {
    densityRules = `
      .scroll { padding-bottom: 30px !important; }
      .grid { gap: 12px 10px !important; }
      .sec-head { padding: 18px 22px 8px !important; }
      .features { padding-top: 14px !important; }
      .areas { padding: 12px 22px 4px !important; }
      .area-row { padding: 4px 0 !important; }
    `;
  }
  sheet.textContent = pillRules + densityRules;
}

Object.assign(window, { Tweaks, applyTweaks });

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "tone": "warm",
  "pill": "outlined",
  "animateMeters": true,
  "compact": false
}/*EDITMODE-END*/;

function Shell() {
  const [route, setRoute] = React.useState({ name: 'landing' });
  const [topNav, setTopNav] = React.useState('ABOUT');
  const [tweaksOn, setTweaksOn] = React.useState(false);
  const [settings, setSettings] = React.useState(TWEAK_DEFAULTS);

  React.useEffect(() => { applyTweaks(settings); }, [settings]);
  

  React.useEffect(() => {
    function onMsg(e) {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode')   setTweaksOn(true);
      if (d.type === '__deactivate_edit_mode') setTweaksOn(false);
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const updateSettings = (patch) => {
    setSettings(s => {
      const next = { ...s, ...patch };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
      return next;
    });
  };

  const goProduct = (p) => setRoute({ name: 'product', product: p });
  const goLanding = () => setRoute({ name: 'landing' });

  return (
    <div className="stage">
      <IOSDevice width={402} height={874}>
        {route.name === 'landing' && (
          <Landing onOpenProduct={goProduct} topNav={topNav} onTopNav={setTopNav} />
        )}
        {route.name === 'product' && (
          <Product product={PRODUCT} topNav={topNav} onTopNav={setTopNav}
            onBack={goLanding} animateOnMount={settings.animateMeters} />
        )}
      </IOSDevice>
      <Tweaks visible={tweaksOn} settings={settings}
        onChange={updateSettings} onClose={() => setTweaksOn(false)} />
    </div>
  );
}

function boot() {
  if (typeof IOSDevice === 'undefined' || typeof Landing === 'undefined' ||
      typeof Product === 'undefined' || typeof Tweaks === 'undefined' ||
      typeof TRENDING === 'undefined') {
    return setTimeout(boot, 30);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Shell />);
}
boot();
</script>
